name: Deploy to VPS

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to fastvps.hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          npm install --ignore-scripts
          npm run build:web

      - name: Deploy frontend via rsync
        uses: easingthemes/ssh-deploy@main
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist-web/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/merci/

      - name: Deploy frontend via scp (fallback)
        uses: appleboy/scp-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'dist-web/'
          target: /var/www/merci/
          strip_components: 1

      - name: Sync webroots, pull code, and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Syncing from /var/www/merci/ to webroots ==="
            rsync -a --delete /var/www/merci/ /var/www/html/ 2>&1 || echo "rsync to html failed"
            rsync -a --delete /var/www/merci/ /opt/open-web-ui-style/dist-web/ 2>&1 || echo "rsync to dist-web failed"

            echo "=== Pulling latest code (optional) ==="
            cd /opt/open-web-ui-style && git pull origin main 2>&1 || echo "git pull failed"

            echo "=== Installing dependencies (optional) ==="
            npm ci --ignore-scripts 2>&1 || echo "npm ci failed"

            echo "=== Building web app (optional) ==="
            npm run build:web 2>&1 || echo "build failed"
            rsync -a --delete dist-web/ /var/www/merci/ 2>&1 || true
            rsync -a --delete dist-web/ /var/www/html/ 2>&1 || true
            rsync -a --delete dist-web/ /opt/open-web-ui-style/dist-web/ 2>&1 || true

            echo "=== Configuring nginx proxy for Brain service ==="
            # Find the nginx config file
            NGINX_CONF=""
            if [ -f "/etc/nginx/sites-enabled/default" ]; then
              NGINX_CONF="/etc/nginx/sites-enabled/default"
            elif [ -f "/etc/nginx/conf.d/default.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/default.conf"
            else
              NGINX_CONF=$(grep -rl "try_files.*index.html" /etc/nginx/ 2>/dev/null | head -1)
            fi
            if [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ]; then
              echo "Using nginx config: $NGINX_CONF"
              # Remove existing /brain/ location block (idempotent)
              sudo sed -i '/^[[:space:]]*location \/brain\/ {/,/^[[:space:]]*}/d' "$NGINX_CONF" 2>&1 || true
              # Insert brain location block before the first "location / {"
              sudo sed -i 's|^[[:space:]]*location / {|    location /brain/ {\n        proxy_pass http://localhost:5001/;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_cache_bypass $http_upgrade;\n        proxy_read_timeout 86400s;\n        proxy_send_timeout 86400s;\n    }\n\n&|' "$NGINX_CONF" 2>&1 || echo "sed insert failed"
              # Test and reload nginx
              sudo nginx -t 2>&1 && sudo nginx -s reload 2>&1 && echo "nginx reloaded successfully" || echo "nginx reload failed"
            else
              echo "nginx config not found at $NGINX_CONF"
            fi

            echo "=== Restarting Docker services ==="
            cd /opt/open-web-ui-style/server && docker compose restart merci_api merci_celery_worker merci_celery_beat 2>&1 || echo "api/worker restart failed"
            docker compose up -d merci_brain 2>&1 || echo "brain start failed"

            echo "Deploy finished at $(date)"