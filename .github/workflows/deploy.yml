name: Deploy to VPS

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to fastvps.hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build web app
        run: |
          npm install --ignore-scripts
          npm run build:web

      - name: Deploy frontend via rsync
        uses: easingthemes/ssh-deploy@main
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist-web/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/merci/

      - name: Deploy frontend via scp (fallback)
        uses: appleboy/scp-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'dist-web/'
          target: /var/www/merci/
          strip_components: 1

      - name: Sync webroots, pull code, and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Syncing from /var/www/merci/ to webroots ==="
            rsync -a --delete /var/www/merci/ /var/www/html/ 2>&1 || echo "rsync to html failed"
            rsync -a --delete /var/www/merci/ /opt/open-web-ui-style/dist-web/ 2>&1 || echo "rsync to dist-web failed"

            echo "=== Pulling latest code (optional) ==="
            cd /opt/open-web-ui-style && git pull origin main 2>&1 || echo "git pull failed"

            echo "=== Installing dependencies (optional) ==="
            npm ci --ignore-scripts 2>&1 || echo "npm ci failed"

            echo "=== Building web app (optional) ==="
            npm run build:web 2>&1 || echo "build failed"
            rsync -a --delete dist-web/ /var/www/merci/ 2>&1 || true
            rsync -a --delete dist-web/ /var/www/html/ 2>&1 || true
            rsync -a --delete dist-web/ /opt/open-web-ui-style/dist-web/ 2>&1 || true

            echo "=== Configuring nginx proxy for Brain service ==="
            sudo cp /opt/open-web-ui-style/deploy/merci.conf /etc/nginx/conf.d/merci.conf 2>&1 || echo "cp failed"
            sudo nginx -t 2>&1
            sudo nginx -s reload 2>&1
            echo "nginx configured"

            echo "=== Installing Docker if missing ==="
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sh 2>&1 || echo "Docker install failed"
              systemctl enable docker 2>&1 || true
              systemctl start docker 2>&1 || true
            else
              echo "Docker already installed"
            fi

            echo "=== Rebuilding Docker images ==="
            cd /opt/open-web-ui-style/server
            docker compose build brain 2>&1 || echo "docker compose build brain failed"
            docker compose build api 2>&1 || echo "docker compose build api failed"

            echo "=== Starting Brain container with restart policy ==="
            cd /opt/open-web-ui-style/server
            docker compose up -d brain 2>&1 || echo "docker compose up brain failed"
            docker compose up -d api 2>&1 || echo "docker compose up api failed"

            echo "=== Creating systemd service for Docker containers on boot ==="
            cat > /etc/systemd/system/merci-brain.service << 'SERVICEEOF'
[Unit]
Description=Merci Brain Container
Requires=docker.service
After=docker.service

[Service]
Restart=always
ExecStart=/usr/bin/docker compose -f /opt/open-web-ui-style/server/docker-compose.yml up brain
ExecStop=/usr/bin/docker compose -f /opt/open-web-ui-style/server/docker-compose.yml stop brain
ExecStartPre=-/usr/bin/docker compose -f /opt/open-web-ui-style/server/docker-compose.yml rm -f brain

[Install]
WantedBy=multi-user.target
SERVICEEOF
            systemctl daemon-reload 2>&1
            systemctl enable merci-brain 2>&1
            systemctl restart merci-brain 2>&1 || echo "brain service restart failed"
            echo "Services status:"
            systemctl is-active merci-brain 2>&1 || true

            echo "=== Brain log (tail 100) ==="
            tail -200 /var/log/merci_brain.log 2>&1 || echo "log not found"
            echo "=== END brain log ==="

            echo "=== API log (tail 50) ==="
            tail -100 /var/log/merci_api.log 2>&1 || echo "api log not found"
            echo "=== END API log ==="

            echo "Deploy finished at $(date)"