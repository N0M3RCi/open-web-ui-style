name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build:web

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} 'mkdir -p /var/www/html/assets'
          scp -i ~/.ssh/deploy_key -r dist/* root@${{ secrets.VPS_HOST }}:/var/www/html/

      - name: Deploy backend to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} 'mkdir -p /opt/merci/app'
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.git' \
            --exclude='node_modules' \
            backend/ root@${{ secrets.VPS_HOST }}:/opt/merci/

      - name: Restart brain service
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} 'systemctl daemon-reload && systemctl restart merci-brain'
          sleep 3
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} 'curl -s http://localhost:5001/health && echo " Service is healthy!"'