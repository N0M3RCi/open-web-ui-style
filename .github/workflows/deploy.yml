name: Deploy to VPS

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to fastvps.hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          npm install --ignore-scripts
          npm run build:web

      - name: Deploy frontend via rsync
        uses: easingthemes/ssh-deploy@main
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist-web/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/merci/

      - name: Deploy frontend via scp (fallback)
        uses: appleboy/scp-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'dist-web/'
          target: /var/www/merci/
          strip_components: 1

      - name: Sync webroots, pull code, and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Syncing from /var/www/merci/ to webroots ==="
            rsync -a --delete /var/www/merci/ /var/www/html/ 2>&1 || echo "rsync to html failed"
            rsync -a --delete /var/www/merci/ /opt/open-web-ui-style/dist-web/ 2>&1 || echo "rsync to dist-web failed"

            echo "=== Pulling latest code (optional) ==="
            cd /opt/open-web-ui-style && git pull origin main 2>&1 || echo "git pull failed"

            echo "=== Installing dependencies (optional) ==="
            npm ci --ignore-scripts 2>&1 || echo "npm ci failed"

            echo "=== Building web app (optional) ==="
            npm run build:web 2>&1 || echo "build failed"
            rsync -a --delete dist-web/ /var/www/merci/ 2>&1 || true
            rsync -a --delete dist-web/ /var/www/html/ 2>&1 || true
            rsync -a --delete dist-web/ /opt/open-web-ui-style/dist-web/ 2>&1 || true

            echo "=== Configuring nginx proxy for Brain service ==="
            sudo cp /opt/open-web-ui-style/deploy/merci.conf /etc/nginx/conf.d/merci.conf 2>&1 || echo "cp failed"
            sudo nginx -t 2>&1
            sudo nginx -s reload 2>&1
            echo "nginx configured"

            echo "=== Rebuilding Docker images ==="
            cd /opt/open-web-ui-style/server
            if command -v docker-compose &> /dev/null; then
              docker-compose build brain 2>&1 || echo "docker-compose build failed"
              docker-compose build api 2>&1 || echo "docker-compose build api failed"
            elif docker compose version &> /dev/null; then
              docker compose build brain 2>&1 || echo "docker compose build failed"
              docker compose build api 2>&1 || echo "docker compose build api failed"
            else
              echo "Docker Compose not found — building images manually"
              cd /opt/open-web-ui-style
              docker build -t merci_brain:latest -f backend/Dockerfile . 2>&1 || echo "docker build brain failed"
              docker build -t merci_api:latest -f server/Dockerfile . 2>&1 || echo "docker build api failed"
            fi

            echo "=== Checking merci-brain service network ==="
            systemctl cat merci-brain 2>&1 || echo "cat failed"
            echo "--- PrivateNetwork check ---"
            systemctl show merci-brain -p PrivateNetwork 2>&1 || echo "show failed"
            PRIV_NET=$(systemctl show merci-brain -p PrivateNetwork 2>/dev/null | cut -d= -f2)
            if [ "$PRIV_NET" = "yes" ]; then
              echo "!!! PrivateNetwork=yes detected — creating override to disable it"
              mkdir -p /etc/systemd/system/merci-brain.service.d
              printf '[Service]\nPrivateNetwork=no\n' > /etc/systemd/system/merci-brain.service.d/override.conf
              systemctl daemon-reload 2>&1
              echo "Override applied. PrivateNetwork=no"
            else
              echo "PrivateNetwork is not set to yes — OK"
            fi

            echo "=== Restarting services ==="
            systemctl restart merci-api 2>&1 || echo "api restart failed (may already be running)"
            systemctl restart merci-brain 2>&1 || echo "brain restart failed, attempting to start..."
            systemctl enable merci-brain 2>&1 || true
            systemctl start merci-brain 2>&1 || echo "brain start failed"
            echo "Services status:"
            systemctl is-active merci-api merci-brain 2>&1 || true

            echo "=== Brain log (tail 50) ==="
            tail -100 /var/log/merci_brain.log 2>&1 || echo "log not found"
            echo "=== END brain log ==="
            echo "Deploy finished at $(date)"