name: Deploy to VPS

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to fastvps.hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          npm install --ignore-scripts
          npm run build:web

      - name: Deploy frontend via rsync
        uses: easingthemes/ssh-deploy@main
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist-web/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/merci/

      - name: Deploy frontend via scp (fallback)
        uses: appleboy/scp-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'dist-web/'
          target: /var/www/merci/
          strip_components: 1

      - name: Sync webroots, pull code, and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Syncing from /var/www/merci/ to webroots ==="
            rsync -a --delete /var/www/merci/ /var/www/html/ 2>&1 || echo "rsync to html failed"
            rsync -a --delete /var/www/merci/ /opt/open-web-ui-style/dist-web/ 2>&1 || echo "rsync to dist-web failed"

            echo "=== Pulling latest code (optional) ==="
            cd /opt/open-web-ui-style && git pull origin main 2>&1 || echo "git pull failed"

            echo "=== Installing dependencies (optional) ==="
            npm ci --ignore-scripts 2>&1 || echo "npm ci failed"

            echo "=== Building web app (optional) ==="
            npm run build:web 2>&1 || echo "build failed"
            rsync -a --delete dist-web/ /var/www/merci/ 2>&1 || true
            rsync -a --delete dist-web/ /var/www/html/ 2>&1 || true
            rsync -a --delete dist-web/ /opt/open-web-ui-style/dist-web/ 2>&1 || true

            echo "=== Configuring nginx proxy for Brain service ==="
            # Also try the Python script if available (from git pull)
            if [ -f /opt/open-web-ui-style/scripts/configure-brain-proxy.py ]; then
              python3 /opt/open-web-ui-style/scripts/configure-brain-proxy.py 2>&1 || echo "script failed, using inline fallback"
            fi
            # Find the nginx config file
            NGINX_CONF=""
            if [ -f "/etc/nginx/sites-enabled/default" ]; then
              NGINX_CONF="/etc/nginx/sites-enabled/default"
            else
              NGINX_CONF=$(grep -rl "try_files.*index.html" /etc/nginx/ 2>/dev/null | head -1)
            fi
            if [ -n "$NGINX_CONF" ]; then
              echo "Using nginx config: $NGINX_CONF"
              python3 -c "
            import re, subprocess, sys
            with open('$NGINX_CONF') as f:
                content = f.read()
            # Remove existing /brain/ location block (idempotent)
            content = re.sub(r'location\s+/brain/\s*\{.*?\n\s*\}', '', content, flags=re.DOTALL)
            # Find first location / { block
            m = re.search(r'location\s+/\s*\{', content)
            if not m:
                print('ERROR: could not find location / {', file=sys.stderr)
                sys.exit(1)
            brain_block = '''    location /brain/ {
                proxy_pass http://localhost:5001/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection \"upgrade\";
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_cache_bypass \$http_upgrade;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
            }

            '''
            content = content[:m.start()] + brain_block + content[m.start():]
            with open('$NGINX_CONF', 'w') as f:
                f.write(content)
            print('Added brain proxy location to $NGINX_CONF')
            subprocess.run(['sudo', 'nginx', '-t'], check=True)
            print('nginx config test passed')
            subprocess.run(['sudo', 'nginx', '-s', 'reload'], check=True)
            print('nginx reloaded successfully')
            " 2>&1 || echo "brain proxy config failed"
            else
              echo "nginx config not found"
            fi

            echo "=== Restarting Docker services ==="
            cd /opt/open-web-ui-style/server && docker compose restart merci_api merci_celery_worker merci_celery_beat 2>&1 || echo "api/worker restart failed"
            docker compose up -d merci_brain 2>&1 || echo "brain start failed"

            echo "Deploy finished at $(date)"