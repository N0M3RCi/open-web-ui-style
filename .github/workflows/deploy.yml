name: Deploy to VPS

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to fastvps.hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web app
        run: |
          npm install --ignore-scripts
          npm run build:web

      - name: Deploy frontend via rsync
        uses: easingthemes/ssh-deploy@main
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist-web/'
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: /var/www/merci/

      - name: Deploy frontend via scp (fallback)
        uses: appleboy/scp-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'dist-web/'
          target: /var/www/merci/
          strip_components: 1

      - name: Sync webroots, pull code, and restart services
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Syncing from /var/www/merci/ to webroots ==="
            rsync -a --delete /var/www/merci/ /var/www/html/ 2>&1 || echo "rsync to html failed"
            rsync -a --delete /var/www/merci/ /opt/open-web-ui-style/dist-web/ 2>&1 || echo "rsync to dist-web failed"

            echo "=== Pulling latest code (optional) ==="
            cd /opt/open-web-ui-style && git pull origin main 2>&1 || echo "git pull failed"

            echo "=== Installing dependencies (optional) ==="
            npm ci --ignore-scripts 2>&1 || echo "npm ci failed"

            echo "=== Building web app (optional) ==="
            npm run build:web 2>&1 || echo "build failed"
            rsync -a --delete dist-web/ /var/www/merci/ 2>&1 || true
            rsync -a --delete dist-web/ /var/www/html/ 2>&1 || true
            rsync -a --delete dist-web/ /opt/open-web-ui-style/dist-web/ 2>&1 || true

            echo "=== Configuring nginx proxy for Brain service ==="
            sudo cp /opt/open-web-ui-style/deploy/merci.conf /etc/nginx/conf.d/merci.conf 2>&1 || echo "cp failed"
            sudo nginx -t 2>&1
            sudo nginx -s reload 2>&1
            echo "nginx configured"

            echo "=== Rebuilding Docker images ==="
            cd /opt/open-web-ui-style/server
            if command -v docker-compose &> /dev/null; then
              docker-compose build brain 2>&1 || echo "docker-compose build failed"
              docker-compose build api 2>&1 || echo "docker-compose build api failed"
            elif docker compose version &> /dev/null; then
              docker compose build brain 2>&1 || echo "docker compose build failed"
              docker compose build api 2>&1 || echo "docker compose build api failed"
            else
              echo "Docker Compose not found — building images manually"
              cd /opt/open-web-ui-style
              docker build -t merci_brain:latest -f backend/Dockerfile . 2>&1 || echo "docker build brain failed"
              docker build -t merci_api:latest -f server/Dockerfile . 2>&1 || echo "docker build api failed"
            fi

            echo "=== Checking merci-brain service network ==="
            systemctl cat merci-brain 2>&1 || echo "cat failed"
            echo "--- PrivateNetwork check ---"
            systemctl show merci-brain -p PrivateNetwork 2>&1 || echo "show failed"
            PRIV_NET=$(systemctl show merci-brain -p PrivateNetwork 2>/dev/null | cut -d= -f2)
            if [ "$PRIV_NET" = "yes" ]; then
              echo "!!! PrivateNetwork=yes detected — creating override to disable it"
              mkdir -p /etc/systemd/system/merci-brain.service.d
              printf '[Service]\nPrivateNetwork=no\n' > /etc/systemd/system/merci-brain.service.d/override.conf
              systemctl daemon-reload 2>&1
              echo "Override applied. PrivateNetwork=no"
            else
              echo "PrivateNetwork is not set to yes — OK"
            fi

            echo "=== Restarting services ==="
            systemctl restart merci-api 2>&1 || echo "api restart failed (may already be running)"
            systemctl restart merci-brain 2>&1 || echo "brain restart failed, attempting to start..."
            systemctl enable merci-brain 2>&1 || true
            systemctl start merci-brain 2>&1 || echo "brain start failed"
            echo "Services status:"
            systemctl is-active merci-api merci-brain 2>&1 || true

            echo "=== Brain log (tail 50) ==="
            tail -100 /var/log/merci_brain.log 2>&1 || echo "log not found"
            echo "=== END brain log ==="

            echo "=== DEEP DIAGNOSTICS: Brain HTTPS connectivity ==="
            echo "--- Brain service user ---"
            systemctl show merci-brain -p User 2>&1 || echo "show User failed"
            BRAIN_USER=$(systemctl show merci-brain -p User 2>/dev/null | cut -d= -f2)
            echo "Brain runs as user: $BRAIN_USER"

            echo "--- nftables rules ---"
            sudo nft list ruleset 2>&1 | head -50 || echo "nftables not available"

            echo "--- Network namespace of brain process ---"
            BRAIN_PID=$(systemctl show merci-brain -p MainPID 2>/dev/null | cut -d= -f2)
            echo "Brain PID: $BRAIN_PID"
            if [ -n "$BRAIN_PID" ] && [ "$BRAIN_PID" -gt 1 ]; then
              ls -la /proc/$BRAIN_PID/ns/net 2>&1 || echo "cannot read net ns"
              ls -la /proc/1/ns/net 2>&1 || echo "cannot read init net ns"
              if diff -q /proc/$BRAIN_PID/ns/net /proc/1/ns/net 2>&1; then
                echo "Network namespace: SAME as init (good)"
              else
                echo "!!! Network namespace: DIFFERENT from init !!!"
              fi
              echo "--- Brain process capabilities ---"
              cat /proc/$BRAIN_PID/status 2>&1 | grep -i cap || echo "cannot read caps"
              echo "--- Brain process environment ---"
              cat /proc/$BRAIN_PID/environ 2>&1 | tr '\0' '\n' | head -30 || echo "cannot read environ"
            else
              echo "Brain PID not available (service may not be running)"
            fi

            echo "--- Python HTTPS test from brain venv ---"
            BRAIN_VENV_PYTHON="/opt/open-web-ui-style/server/.venv/bin/python"
            if [ -f "$BRAIN_VENV_PYTHON" ]; then
              timeout 30 $BRAIN_VENV_PYTHON -c "
import sys, socket, ssl, json, urllib.request, urllib.error
print('Python version:', sys.version)
print('SSL version:', ssl.OPENSSL_VERSION)

# Test 1: DNS resolution
try:
    addr = socket.getaddrinfo('cloud-api.near.ai', 443)
    print('DNS resolved cloud-api.near.ai:', addr[0][4])
except Exception as e:
    print('DNS FAILED:', e)

# Test 2: Socket connection
try:
    sock = socket.create_connection(('cloud-api.near.ai', 443), timeout=10)
    print('TCP connection to cloud-api.near.ai:443: SUCCESS')
    sock.close()
except Exception as e:
    print('TCP connection FAILED:', e)

# Test 3: SSL connection
try:
    ctx = ssl.create_default_context()
    sock = socket.create_connection(('cloud-api.near.ai', 443), timeout=10)
    ssock = ctx.wrap_socket(sock, server_hostname='cloud-api.near.ai')
    print('SSL handshake: SUCCESS, cipher:', ssock.cipher())
    ssock.close()
except Exception as e:
    print('SSL handshake FAILED:', e)

# Test 4: HTTPS request
try:
    req = urllib.request.Request(
        'https://cloud-api.near.ai/v1/models',
        headers={'User-Agent': 'Mozilla/5.0'},
    )
    with urllib.request.urlopen(req, timeout=15) as resp:
        print('HTTPS request SUCCESS, status:', resp.status)
except Exception as e:
    print('HTTPS request FAILED:', e)
" 2>&1 || echo "Python test failed with exit code $?"
            else
              echo "Brain venv Python not found at $BRAIN_VENV_PYTHON"
            fi

            echo "--- Test curl as brain user ---"
            if [ -n "$BRAIN_USER" ]; then
              timeout 15 sudo -u "$BRAIN_USER" curl -sk --max-time 10 "https://cloud-api.near.ai/v1/models" -H "Authorization: Bearer test" 2>&1 | head -3 || echo "curl as brain user failed"
            else
              echo "Cannot determine brain user"
            fi

            echo "=== END DEEP DIAGNOSTICS ==="
            echo "Deploy finished at $(date)"