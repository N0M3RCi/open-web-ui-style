# Nginx configuration for M3RCI - UniMind
# Fix: /chat location (without trailing slash) proxies to brain_backend
# ========================================================================

upstream brain_backend {
    server 127.0.0.1:5001;
}

upstream api_backend {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name class.n0m3rci.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name class.n0m3rci.cc;

    ssl_certificate /etc/letsencrypt/live/class.n0m3rci.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/class.n0m3rci.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Max request body size for file uploads
    client_max_body_size 100M;

    # Health check — proxy to Brain backend
    location /health {
        proxy_pass http://brain_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Chat SSE streaming =====
    # Match /chat and /chat/* (NO trailing slash required)
    # Proxies to Brain backend which handles POST /chat (SSE streaming),
    # GET /chat/{project_id}/status, DELETE /chat/{id}, etc.
    location /chat {
        proxy_pass http://brain_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streaming requires buffering off
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ===== Brain workspace routes =====
    location /workspace/ {
        proxy_pass http://brain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Server API routes =====
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== SPA static files =====
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}