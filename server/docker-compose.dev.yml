services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: nova_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nova_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nova']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: nova-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - nova_redis_data:/data
    networks:
      - nova_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  nova_redis_data:

networks:
  nova_network:
    driver: bridge
